version: "3.9"

services:
  app:
    build: .
    container_name: tg_saas_bot_core
    restart: always
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: tg_postgres_cluster
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tg_saas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  dashboard:
    build: .
    container_name: tg_saas_dashboard_web
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata:

services:
  - type: web
    name: tg-saas-operating-system
    runtime: python
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    # 🔗 🌐 [CLOUD APP ROUTING]: ပင်မအူတိုင်ဖြစ်သော dashboard.app:app နှင့် ကွက်တိ ချိတ်ပိတ်ခြင်း
    startCommand: "uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4

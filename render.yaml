services:
  - type: web
    name: tg-saas-operating-system
    runtime: python
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    # 🔗 🌐 [CLOUD API GATEWAY]: FastAPI အား Uvicorn ဖြင့် Cloud Web Proxy ချိတ်ဆက်ခြင်း
    startCommand: "uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4

services:
  # 🌐 [WEB INTERFACE INSTANCE] - Render Web App Core Node
  - type: web
    name: tg-saas-web-dashboard
    runtime: python
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    # 🔗 🚀 အစ်ကို ညွှန်ကြားထားသည့်အတိုင်း Web Server နေရာတွင် FastAPI App သီးသန့်အား မောင်းနှင်ခြင်း
    startCommand: "uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4

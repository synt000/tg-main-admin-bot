name: 🔧 BusinessOS Enterprise Core v1.3 Continuous Integration Guard

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  comprehensive-regression-audit:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: 📂 Checkout Source Repository Manifests
      uses: actions/checkout@v4

    - name: 🐍 Initialize Python Toolchain Engine Context
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 📦 Install Environment Base Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt

    - name: 🔁 Execute Phase 3 Grand Regression Audit Core Loops
      run: |
        PYTHONPATH=. python tests/run_regression.py
